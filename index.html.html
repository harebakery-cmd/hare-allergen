          {/* 비밀번호 변경 모달 */}
          {showChangePwModal && (
            <div className="lock-overlay" onClick={() => setShowChangePwModal(false)}>
              <div className="lock-box" onClick={e => e.stopPropagation()}>
                <div className="lock-icon">🔑</div>
                <div className="lock-title">비밀번호 변경</div>
                <div className="lock-sub">새 비밀번호를 설정합니다</div>
                <input className="lock-input" type="password" placeholder="새 비밀번호" value={newPwInput}
                  onChange={e => { setNewPwInput(e.target.value); setPwChangeError(""); }} style={{marginBottom:10}} />
                <input className="lock-input" type="password" placeholder="비밀번호 확인" value={newPwConfirm}
                  onChange={e => { setNewPwConfirm(e.target.value); setPwChangeError(""); }}
                  onKeyDown={e => e.key === "Enter" && submitChangePw()} />
                <div className="lock-error">{pwChangeError}</div>
                <div className="lock-btns">
                  <button className="btn btn-secondary" style={{flex:1}} onClick={() => setShowChangePwModal(false)}>취소</button>
                  <button className="btn btn-primary" style={{flex:1}} onClick={submitChangePw}>변경</button>
                </div>
              </div>
            </div>
          )}

          <div className="app">
            <div className="header">
              <h1>🥐 알레르기 유발물질 관리 시스템</h1>
              <p>제품 {products.length}종 · 알레르기 항목 {ALLERGENS.length}가지</p>
              {fbError
                ? <div className="sync-badge offline"><span className="sync-dot"></span>Firebase 연결 오류</div>
                : <div className="sync-badge"><span className="sync-dot"></span>🔥 Firebase 실시간 동기화 · QR 접속 가능</div>
              }
            </div>

            {/* Firebase 설정 안내 배너 (설정 전 표시) */}
            {fbError && (
              <div className="setup-banner">
                <h3>🔧 Firebase 설정이 필요합니다</h3>
                <ol>
                  <li>아래 <strong>상세 설정 안내 문서</strong>를 따라 Firebase 프로젝트를 만드세요</li>
                  <li>이 HTML 파일의 상단 <code>firebaseConfig</code> 부분에 발급받은 값을 붙여넣으세요</li>
                  <li>저장 후 다시 열면 모든 기기에서 실시간 동기화됩니다</li>
                </ol>
              </div>
            )}

            <div className="tab-bar">
              <button className={`tab-btn ${tab==="view"?"active":""}`} onClick={() => setTab("view")}>📋 조회</button>
              <button className={`tab-btn ${tab==="manage"?"active":""}`} onClick={handleManageTabClick}>
                {isManageLocked ? "🔒" : "🔓"} 관리
              </button>
              <button className={`tab-btn ${tab==="stats"?"active":""}`} onClick={() => setTab("stats")}>📊 통계</button>
            </div>

            {/* ── 조회 탭 ── */}
            {tab === "view" && (
              <React.Fragment>
                <div className="search-row">
                  <input className="search-input" placeholder="🔍 제품명 검색..." value={search} onChange={e => setSearch(e.target.value)} />
                  <select className="cat-select" value={category} onChange={e => setCategory(e.target.value)}>
                    {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                  </select>
                  <button className={`sort-btn ${sortOrder==="asc"?"active":""}`} onClick={() => setSortOrder(sortOrder==="asc"?"none":"asc")}>가나다 ↑</button>
                  <button className={`sort-btn ${sortOrder==="desc"?"active":""}`} onClick={() => setSortOrder(sortOrder==="desc"?"none":"desc")}>역순 ↓</button>
                </div>

                <div className="allergen-filters">
                  <div className="filter-label">🚨 포함 알레르기 필터 (복수 선택 가능)</div>
                  {ALLERGENS.map(a => (
                    <button key={a} className={`allergen-chip ${filterAllergens.includes(a)?"selected":""}`} onClick={() => toggleAllergenFilter(a)}>
                      {a}{filterAllergens.includes(a) && ` (${allergenCounts[a]})`}
                    </button>
                  ))}
                  {filterAllergens.length > 0 && <button className="allergen-chip" onClick={() => setFilterAllergens([])}>✕ 초기화</button>}
                </div>

                <div className="results-info">
                  검색결과: <strong>{filteredProducts.length}</strong>건
                  {filterAllergens.length > 0 && ` · 필터: ${filterAllergens.join(", ")} 포함`}
                  {sortOrder !== "none" && ` · ${sortOrder==="asc"?"가나다순":"역순"} 정렬`}
                </div>

                {filteredProducts.length === 0
                  ? <div className="empty-state"><div className="empty-icon">🔍</div><p>검색 결과가 없습니다</p></div>
                  : (
                    <div className="product-grid">
                      {filteredProducts.map(p => {
                        const allergens = getProductAllergens(p);
                        const catColor = CAT_COLORS[p["카테고리"]] || "#ddd";
                        return (
                          <div key={p._id} className={`product-card ${selectedProduct?._id===p._id?"selected":""}`} onClick={() => setSelectedProduct(p)}>
                            <div className="card-body" style={{flex:1,minWidth:0}}>
                              <div className="card-header">
                                <div className="product-name">{p["제품이름"]}</div>
                                <span className="cat-badge" style={{background:catColor+"33",color:"#555",border:`1px solid ${catColor}55`}}>
                                  {p["카테고리"] || "미분류"}
                                </span>
                              </div>
                              <div className="allergen-tags">
                                {allergens.length === 0
                                  ? <span className="no-allergen">알레르기 없음</span>
                                  : allergens.map(a => (
                                    <span key={a} className={`allergen-tag ${filterAllergens.includes(a)?"danger":""}`}>{a}</span>
                                  ))
                                }
                              </div>
                            </div>
                            <span className="card-arrow">›</span>
                          </div>
                        );
                      })}
                    </div>
                  )
                }
              </React.Fragment>
            )}

            {/* ── 관리 탭 ── */}
            {tab === "manage" && !isManageLocked && (
              <React.Fragment>
                <div className="pw-manage">
                  <span className="pw-manage-label">🔑 관리자 잠금</span>
                  <span className="lock-status unlocked">🔓 잠금 해제됨</span>
                  <button className="btn btn-secondary" style={{padding:"6px 14px",fontSize:12,marginLeft:8}} onClick={() => { setShowChangePwModal(true); setNewPwInput(""); setNewPwConfirm(""); setPwChangeError(""); }}>비밀번호 변경</button>
                  <button className="btn btn-danger" style={{padding:"6px 14px",fontSize:12,marginLeft:4}} onClick={lockManage}>잠금</button>
                </div>
                <div className="manage-section">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                    <div className="manage-title">제품 목록 ({products.length}종)</div>
                    <div style={{display:"flex",gap:8}}>
                      <button className="btn btn-secondary" onClick={exportCSV}>⬇ CSV 내보내기</button>
                      <button className="btn btn-primary" onClick={openNew}>+ 새 제품 추가</button>
                    </div>
                  </div>
                  <div style={{overflowX:"auto"}}>
                    <table className="manage-table">
                      <thead>
                        <tr>
                          <th style={{minWidth:160}}>제품이름</th>
                          <th style={{minWidth:140}}>카테고리</th>
                          <th style={{minWidth:200}}>주요 알레르기</th>
                          <th style={{minWidth:100}}>관리</th>
                        </tr>
                      </thead>
                      <tbody>
                        {products.map(p => {
                          const allergens = getProductAllergens(p);
                          return (
                            <tr key={p._id}>
                              <td style={{fontWeight:600}}>{p["제품이름"]}</td>
                              <td>
                                <span style={{background:CAT_COLORS[p["카테고리"]]+"22",color:"#555",padding:"2px 10px",borderRadius:50,fontSize:11,fontWeight:600}}>
                                  {p["카테고리"]||"미분류"}
                                </span>
                              </td>
                              <td>
                                {allergens.length===0
                                  ? <span style={{color:"#ccc",fontSize:12}}>없음</span>
                                  : allergens.slice(0,5).map(a => (
                                    <span key={a} style={{display:"inline-block",margin:"1px 2px",background:"#fff3cd",color:"#856404",padding:"1px 7px",borderRadius:50,fontSize:11,fontWeight:600,border:"1px solid #ffc107"}}>{a}</span>
                                  ))
                                }
                                {allergens.length > 5 && <span style={{fontSize:11,color:"#aaa"}}> +{allergens.length-5}</span>}
                              </td>
                              <td>
                                <div className="action-btns">
                                  <button className="btn-sm btn-sm-edit" onClick={() => openEdit(p)}>수정</button>
                                  <button className="btn-sm btn-sm-del" onClick={() => deleteProduct(p._id)}>삭제</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </React.Fragment>
            )}

            {/* ── 통계 탭 ── */}
            {tab === "stats" && (
              <React.Fragment>
                <div className="stats-row">
                  {CATEGORIES.filter(c => c !== "전체").map(c => {
                    const count = products.filter(p => p["카테고리"] === c).length;
                    return (
                      <div key={c} className="stat-card">
                        <div className="stat-num" style={{color: CAT_COLORS[c] || "#333"}}>{count}</div>
                        <div className="stat-label">{c || "미분류"}</div>
                      </div>
                    );
                  })}
                </div>
                <div className="manage-section">
                  <div className="manage-title">알레르기별 포함 제품 수</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {ALLERGENS.sort((a,b) => allergenCounts[b]-allergenCounts[a]).map(a => {
                      const pct = products.length > 0 ? Math.round((allergenCounts[a] / products.length) * 100) : 0;
                      return (
                        <div key={a} style={{display:"flex",alignItems:"center",gap:12}}>
                          <div style={{width:70,fontSize:13,fontWeight:600,color:"#555",flexShrink:0}}>{a}</div>
                          <div style={{flex:1,background:"#f0f0f0",borderRadius:50,height:16,overflow:"hidden"}}>
                            <div style={{width:`${pct}%`,height:"100%",background:pct>60?"#ff4757":pct>30?"#ffa502":"#2ed573",borderRadius:50,transition:"width 0.5s"}}/>
                          </div>
                          <div style={{width:70,fontSize:13,color:"#888",flexShrink:0,textAlign:"right"}}>{allergenCounts[a]}종 ({pct}%)</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </React.Fragment>
            )}
          </div>

          {/* ── 제품 상세 모달 ── */}
          {selectedProduct && (
            <div className="modal-overlay" onClick={() => setSelectedProduct(null)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                  <div className="modal-title">{selectedProduct["제품이름"]}</div>
                  <button className="close-btn" onClick={() => setSelectedProduct(null)}>×</button>
                </div>
                <span className="detail-cat" style={{background:CAT_COLORS[selectedProduct["카테고리"]]+"33",color:"#555",border:`1px solid ${CAT_COLORS[selectedProduct["카테고리"]]||"#ddd"}55`}}>
                  {selectedProduct["카테고리"] || "미분류"}
                </span>
                <div style={{fontSize:13,color:"#888",marginBottom:16}}>
                  포함 알레르기: <strong style={{color:"#c62828"}}>{getProductAllergens(selectedProduct).length}가지</strong>
                </div>
                <div className="allergen-grid">
                  {ALLERGENS.map(a => (
                    <div key={a} className={`allergen-item ${selectedProduct[a]==="Yes"?"yes":"no"}`}>
                      <div className={`allergen-dot ${selectedProduct[a]==="Yes"?"yes":"no"}`}/>
                      <span>{a}</span>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:20,display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button className="btn btn-secondary" onClick={() => setSelectedProduct(null)}>닫기</button>
                  {!isManageLocked && (
                    <button className="btn btn-primary" onClick={() => { setSelectedProduct(null); setTab("manage"); openEdit(selectedProduct); }}>수정하기</button>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* ── 제품 추가/수정 폼 모달 ── */}
          {showForm && formData && (
            <div className="modal-overlay" onClick={() => setShowForm(false)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                  <div className="modal-title">{editProduct !== null ? "제품 수정" : "새 제품 추가"}</div>
                  <button className="close-btn" onClick={() => setShowForm(false)}>×</button>
                </div>
                <div className="form-row">
                  <div className="form-group">
                    <label className="form-label">제품이름 *</label>
                    <input className="form-input" value={formData["제품이름"]} onChange={e => setFormData(f=>({...f,"제품이름":e.target.value}))} placeholder="제품이름 입력" />
                  </div>
                  <div className="form-group">
                    <label className="form-label">카테고리</label>
                    <select className="form-select" value={formData["카테고리"]} onChange={e => setFormData(f=>({...f,"카테고리":e.target.value}))}>
                      {CATEGORIES.filter(c=>c!=="전체").map(c => <option key={c} value={c}>{c}</option>)}
                      <option value="">미분류</option>
                    </select>
                  </div>
                </div>
                <div className="form-label" style={{marginBottom:10}}>알레르기 유발물질 (포함된 항목 선택)</div>
                <div className="allergen-form-grid">
                  {ALLERGENS.map(a => (
                    <button key={a} className={`allergen-toggle ${formData[a]==="Yes"?"on":""}`} onClick={() => setFormData(f=>({...f,[a]:f[a]==="Yes"?"No":"Yes"}))}>
                      {a}
                    </button>
                  ))}
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
                  <button className="btn btn-secondary" onClick={() => setShowForm(false)}>취소</button>
                  <button className="btn btn-primary" onClick={saveForm} disabled={saving}>
                    {saving ? "저장 중..." : (editProduct !== null ? "저장" : "추가")}
                  </button>
                </div>
              </div>
            </div>
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
