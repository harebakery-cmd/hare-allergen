    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:#f7f3ee;min-height:100vh}
    .app{max-width:1400px;margin:0 auto;padding:0 16px 80px}
    .header{background:#1a1a2e;color:white;padding:20px 24px;margin-bottom:24px;border-radius:0 0 20px 20px}
    .header h1{font-family:'Montserrat',sans-serif;font-size:22px;letter-spacing:-.5px}
    .header p{font-size:12px;color:#aaa;margin-top:4px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .tab-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .tab-btn{padding:10px 24px;border-radius:50px;border:2px solid #1a1a2e;background:white;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;color:#1a1a2e}
    .tab-btn.active{background:#1a1a2e;color:white}
    .search-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
    .search-input{flex:1;min-width:200px;padding:10px 16px;border-radius:50px;border:2px solid #ddd;font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border .2s}
    .search-input:focus{border-color:#1a1a2e}
    .cat-select{padding:10px 16px;border-radius:50px;border:2px solid #ddd;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;background:white;cursor:pointer}
    .sort-btn{padding:10px 16px;border-radius:50px;border:2px solid #ddd;background:white;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;font-weight:600;color:#555;white-space:nowrap}
    .sort-btn.active{border-color:#1a1a2e;background:#1a1a2e;color:white}
    .allergen-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;background:white;padding:14px;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .filter-label{width:100%;font-size:12px;font-weight:700;color:#666;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
    .allergen-chip{padding:5px 12px;border-radius:50px;border:2px solid #e0e0e0;background:white;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;color:#555;white-space:nowrap}
    .allergen-chip.selected{background:#ff4757;border-color:#ff4757;color:white;font-weight:700}
    .results-info{font-size:13px;color:#888;margin-bottom:10px}
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .product-card{background:white;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent}
    .product-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
    .product-card.selected{border-color:#1a1a2e}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .product-name{font-size:15px;font-weight:700;color:#1a1a2e;line-height:1.3}
    .cat-badge{font-size:10px;padding:3px 10px;border-radius:50px;white-space:nowrap;font-weight:600;margin-left:6px;flex-shrink:0;margin-top:2px}
    .allergen-tags{display:flex;flex-wrap:wrap;gap:4px}
    .allergen-tag{font-size:11px;padding:2px 8px;border-radius:50px;background:#fff3cd;color:#856404;font-weight:600;border:1px solid #ffc107}
    .allergen-tag.danger{background:#ffebee;color:#c62828;border-color:#ef9a9a}
    .no-allergen{font-size:12px;color:#aaa}
    @media(max-width:600px){
      .product-grid{grid-template-columns:1fr;gap:8px}
      .product-card{padding:12px 14px;border-radius:12px;display:flex;align-items:center;gap:12px}
      .card-body{flex:1;min-width:0}
      .card-header{margin-bottom:6px;flex-wrap:wrap;gap:4px}
      .product-name{font-size:14px}
      .cat-badge{font-size:9px;padding:2px 8px}
      .allergen-tag{font-size:10px;padding:1px 7px}
      .card-arrow{font-size:18px;color:#ccc;flex-shrink:0}
    }
    @media(min-width:601px){.card-arrow{display:none}}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:white;border-radius:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:24px}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .modal-title{font-size:20px;font-weight:900;color:#1a1a2e}
    .close-btn{width:32px;height:32px;border-radius:50%;border:none;background:#f0f0f0;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
    .detail-cat{display:inline-block;padding:4px 14px;border-radius:50px;font-size:12px;font-weight:700;margin-bottom:16px}
    .allergen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .allergen-item{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:10px;font-size:13px;font-weight:500}
    .allergen-item.yes{background:#ffebee;color:#c62828}
    .allergen-item.no{background:#f5f5f5;color:#aaa}
    .allergen-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .allergen-dot.yes{background:#e53935}
    .allergen-dot.no{background:#ccc}
    .manage-section{background:white;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .manage-title{font-size:16px;font-weight:900;color:#1a1a2e;margin-bottom:16px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-label{font-size:12px;font-weight:700;color:#555}
    .form-input,.form-select{padding:10px 14px;border-radius:10px;border:2px solid #e0e0e0;font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border .2s;width:100%}
    .form-input:focus,.form-select:focus{border-color:#1a1a2e}
    .allergen-form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
    .allergen-toggle{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:10px;border:2px solid #e0e0e0;cursor:pointer;transition:all .15s;font-size:12px;background:white;font-family:'Noto Sans KR',sans-serif}
    .allergen-toggle.on{border-color:#ff4757;background:#ffebee;color:#c62828;font-weight:700}
    .btn{padding:10px 24px;border-radius:50px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
    .btn-primary{background:#1a1a2e;color:white}
    .btn-primary:hover{background:#2d2d4e}
    .btn-danger{background:#ff4757;color:white}
    .btn-secondary{background:#f0f0f0;color:#555}
    .btn-success{background:#2ed573;color:white}
    .btn-success:hover{background:#26bc62}
    .manage-table{width:100%;border-collapse:collapse;font-size:13px}
    .manage-table th{background:#1a1a2e;color:white;padding:10px 12px;text-align:left;font-weight:700}
    .manage-table th:first-child{border-radius:10px 0 0 0}
    .manage-table th:last-child{border-radius:0 10px 0 0}
    .manage-table td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
    .manage-table tr:hover td{background:#fafafa}
    .action-btns{display:flex;gap:6px}
    .btn-sm{padding:5px 12px;font-size:12px;border-radius:50px;border:none;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer}
    .btn-sm-edit{background:#e3f2fd;color:#1565c0}
    .btn-sm-del{background:#ffebee;color:#c62828}
    .empty-state{text-align:center;padding:60px 20px;color:#bbb}
    .empty-icon{font-size:48px;margin-bottom:12px}
    .stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
    .stat-card{flex:1;min-width:120px;background:white;border-radius:12px;padding:14px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .stat-num{font-size:28px;font-weight:900;font-family:'Montserrat',sans-serif;color:#1a1a2e}
    .stat-label{font-size:11px;color:#888;margin-top:2px}
    .lock-overlay{position:fixed;inset:0;background:rgba(26,26,46,.92);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .lock-box{background:white;border-radius:24px;padding:32px;width:100%;max-width:360px;text-align:center}
    .lock-icon{font-size:48px;margin-bottom:16px}
    .lock-title{font-size:20px;font-weight:900;color:#1a1a2e;margin-bottom:6px}
    .lock-sub{font-size:13px;color:#888;margin-bottom:24px}
    .lock-input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;font-size:18px;text-align:center;letter-spacing:6px;outline:none;font-family:monospace;transition:border .2s}
    .lock-input:focus{border-color:#1a1a2e}
    .lock-error{color:#e53935;font-size:12px;margin-top:8px;min-height:18px}
    .lock-btns{display:flex;gap:10px;margin-top:20px}
    .pw-manage{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#f7f3ee;border-radius:12px;margin-bottom:16px;font-size:13px}
    .pw-manage-label{flex:1;color:#555;font-weight:600}
    .lock-status{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:50px}
    .lock-status.unlocked{background:#e8f5e9;color:#2e7d32}
    @media(max-width:600px){
      .allergen-form-grid{grid-template-columns:repeat(3,1fr)}
      .form-row{grid-template-columns:1fr}
      .allergen-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>

          initDone.current = true;
          // 최초: 초기 데이터 일괄 업로드 (batch write)
          const batches = [];
          let batch = db.batch();
          let count = 0;
          INITIAL_DATA.forEach((p, i) => {
            const ref = db.collection("products").doc("p_" + i);
            batch.set(ref, {...p, _id: "p_" + i});
            count++;
            if (count === 400) { batches.push(batch); batch = db.batch(); count = 0; }
          });
          if (count > 0) batches.push(batch);
          await Promise.all(batches.map(b => b.commit()));
        } else {
          const docs = snap.docs.map(d => ({...d.data(), _id: d.id}));
          docs.sort((a, b) => {
            const na = parseInt(a._id.replace("p_","")) || 0;
            const nb = parseInt(b._id.replace("p_","")) || 0;
            return na - nb;
          });
          setProducts(docs);
          setLoaded(true);

      }, err => {
        console.error(err);
        setLoaded(true);
      });
      return unsub;

      const range = XLSX.utils.decode_range(ws['!ref']);
      for (let C = range.s.c; C <= range.e.c; C++) {
        const addr = XLSX.utils.encode_cell({r:0, c:C});
        if (ws[addr]) ws[addr].s = { fill:{fgColor:{rgb:"1A1A2E"}}, font:{color:{rgb:"FFFFFF"}, bold:true}, alignment:{horizontal:"center"} };
      }
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "알레르기 목록");
      XLSX.writeFile(wb, "알레르기_유발물질_목록.xlsx");

                    <thead><tr>
                      <th style={{minWidth:160}}>제품이름</th>
                      <th style={{minWidth:140}}>카테고리</th>
                      <th style={{minWidth:200}}>주요 알레르기</th>
                      <th style={{minWidth:100}}>관리</th>
                    </tr></thead>
                    <tbody>
                      {products.map(p=>{
                        const al=getProductAllergens(p);
                        return(
                          <tr key={p._id}>
                            <td style={{fontWeight:600}}>{p["제품이름"]}</td>
                            <td><span style={{background:(CAT_COLORS[p["카테고리"]]||"#ddd")+"22",color:"#555",padding:"2px 10px",borderRadius:50,fontSize:11,fontWeight:600}}>{p["카테고리"]||"미분류"}</span></td>
                            <td>
                              {al.length===0 ? <span style={{color:"#ccc",fontSize:12}}>없음</span>
                                : al.slice(0,5).map(a=><span key={a} style={{display:"inline-block",margin:"1px 2px",background:"#fff3cd",color:"#856404",padding:"1px 7px",borderRadius:50,fontSize:11,fontWeight:600,border:"1px solid #ffc107"}}>{a}</span>)}
                              {al.length>5 && <span style={{fontSize:11,color:"#aaa"}}> +{al.length-5}</span>}
                            </td>
                            <td><div className="action-btns">
                              <button className="btn-sm btn-sm-edit" onClick={()=>openEdit(p)}>수정</button>
                              <button className="btn-sm btn-sm-del" onClick={()=>deleteProduct(p._id)}>삭제</button>
                            </div></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </React.Fragment>
          )}

          {/* ── 통계 탭 ── */}
          {tab==="stats" && (
            <React.Fragment>
              <div className="stats-row">
                {CATEGORIES.filter(c=>c!=="전체").map(c=>{
                  const cnt=products.filter(p=>p["카테고리"]===c).length;
                  return(<div key={c} className="stat-card"><div className="stat-num" style={{color:CAT_COLORS[c]||"#333"}}>{cnt}</div><div className="stat-label">{c||"미분류"}</div></div>);
                })}
              </div>
              <div className="manage-section">
                <div className="manage-title">알레르기별 포함 제품 수</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {[...ALLERGENS].sort((a,b)=>allergenCounts[b]-allergenCounts[a]).map(a=>{
                    const pct=products.length>0?Math.round(allergenCounts[a]/products.length*100):0;
                    return(<div key={a} style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:70,fontSize:13,fontWeight:600,color:"#555",flexShrink:0}}>{a}</div>
                      <div style={{flex:1,background:"#f0f0f0",borderRadius:50,height:16,overflow:"hidden"}}>
                        <div style={{width:`${pct}%`,height:"100%",background:pct>60?"#ff4757":pct>30?"#ffa502":"#2ed573",borderRadius:50,transition:"width .5s"}}/>
                      </div>
                      <div style={{width:70,fontSize:13,color:"#888",flexShrink:0,textAlign:"right"}}>{allergenCounts[a]}종 ({pct}%)</div>
                    </div>);
                  })}
                </div>
              </div>
            </React.Fragment>
          )}
        </div>

        {/* 상세 모달 */}
        {selectedProduct && (
          <div className="modal-overlay" onClick={()=>setSelectedProduct(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-header">
                <div className="modal-title">{selectedProduct["제품이름"]}</div>
                <button className="close-btn" onClick={()=>setSelectedProduct(null)}>×</button>
              </div>
              <span className="detail-cat" style={{background:(CAT_COLORS[selectedProduct["카테고리"]]||"#ddd")+"33",color:"#555",border:`1px solid ${(CAT_COLORS[selectedProduct["카테고리"]]||"#ddd")}55`}}>
                {selectedProduct["카테고리"]||"미분류"}
              </span>
              <div style={{fontSize:13,color:"#888",marginBottom:16}}>포함 알레르기: <strong style={{color:"#c62828"}}>{getProductAllergens(selectedProduct).length}가지</strong></div>
              <div className="allergen-grid">
                {ALLERGENS.map(a=>(
                  <div key={a} className={`allergen-item ${selectedProduct[a]==="Yes"?"yes":"no"}`}>
                    <div className={`allergen-dot ${selectedProduct[a]==="Yes"?"yes":"no"}`}/><span>{a}</span>
                  </div>
                ))}
              </div>
              <div style={{marginTop:20,display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button className="btn btn-secondary" onClick={()=>setSelectedProduct(null)}>닫기</button>
                {!isManageLocked && <button className="btn btn-primary" onClick={()=>{setSelectedProduct(null);setTab("manage");openEdit(selectedProduct);}}>수정하기</button>}
              </div>
            </div>
          </div>
        )}

        {/* 추가/수정 폼 모달 */}
        {showForm && formData && (
          <div className="modal-overlay" onClick={()=>setShowForm(false)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-header">
                <div className="modal-title">{editProduct?"제품 수정":"새 제품 추가"}</div>
                <button className="close-btn" onClick={()=>setShowForm(false)}>×</button>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">제품이름 *</label>
                  <input className="form-input" value={formData["제품이름"]} onChange={e=>setFormData(f=>({...f,"제품이름":e.target.value}))} placeholder="제품이름 입력"/>
                </div>
                <div className="form-group">
                  <label className="form-label">카테고리</label>
                  <select className="form-select" value={formData["카테고리"]} onChange={e=>setFormData(f=>({...f,"카테고리":e.target.value}))}>
                    {CATEGORIES.filter(c=>c!=="전체").map(c=><option key={c} value={c}>{c}</option>)}
                    <option value="">미분류</option>
                  </select>
                </div>
              </div>
              <div className="form-label" style={{marginBottom:10}}>알레르기 유발물질</div>
              <div className="allergen-form-grid">
                {ALLERGENS.map(a=>(
                  <button key={a} className={`allergen-toggle ${formData[a]==="Yes"?"on":""}`} onClick={()=>setFormData(f=>({...f,[a]:f[a]==="Yes"?"No":"Yes"}))}>
                    {a}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
                <button className="btn btn-secondary" onClick={()=>setShowForm(false)}>취소</button>
                <button className="btn btn-primary" onClick={saveForm} disabled={saving}>{saving?"저장 중...":(editProduct?"저장":"추가")}</button>
              </div>
            </div>
          </div>
        )}
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
